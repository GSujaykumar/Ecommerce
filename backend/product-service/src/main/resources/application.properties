server.port=8082
spring.application.name=product-service

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3307/ecommerce_product?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/ecommerce-realm

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# MinIO / AWS S3 Config
minio.url=http://localhost:9000
minio.access.name=admin
minio.access.secret=password
minio.bucket.name=products

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=when-authorized
# Zipkin tracing
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=${SPRING_ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans
