version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - ecommerce-net

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - ecommerce-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-net

  maildev:
    image: maildev/maildev
    container_name: maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - ecommerce-net

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - ecommerce-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      # Databases will be created by Hibernate automatically
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-net

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ecommerce-net

  # === MICROSERVICES ===
  discovery-server:
    build: 
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-net

  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - keycloak
      - redis
    networks:
      - ecommerce-net
    environment:
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  user-service:
    build: 
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      - discovery-server
      - mysql
    networks:
      - ecommerce-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce_user?createDatabaseIfNotExist=true
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  product-service:
    build: 
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    depends_on:
      - discovery-server
      - mysql
      - redis
    networks:
      - ecommerce-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce_product?createDatabaseIfNotExist=true
      - SPRING_DATA_REDIS_HOST=redis
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  order-service:
    build: 
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      - discovery-server
      - mysql
      - kafka
    networks:
      - ecommerce-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce_order?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  payment-service:
    build: 
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    depends_on:
      - discovery-server
      - mysql
      - kafka
    networks:
      - ecommerce-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce_payment?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  inventory-service:
    build: 
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    depends_on:
      - discovery-server
      - mysql
      - kafka
    networks:
      - ecommerce-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce_inventory?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  cart-service:
    build: 
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    depends_on:
      - discovery-server
      - redis
    networks:
      - ecommerce-net
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

  notification-service:
    build: 
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      - discovery-server
      - kafka
      - maildev
    networks:
      - ecommerce-net
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/
      - SPRING_MAIL_HOST=maildev
      - SPRING_MAIL_PORT=1025

  aggregation-service:
    build: 
      context: ./aggregation-service
      dockerfile: Dockerfile
    container_name: aggregation-service
    depends_on:
      - discovery-server
      - product-service
    networks:
      - ecommerce-net
    environment:
      - EUREKA_SERVER_URL=http://discovery-server:8761/eureka/

volumes:
  keycloak_data:
  mysql_data:
  minio_data:

networks:
  ecommerce-net:
    driver: bridge
