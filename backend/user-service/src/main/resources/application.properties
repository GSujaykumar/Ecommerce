server.port=8081
spring.application.name=user-service

# Security Configuration (Resource Server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/ecommerce-realm

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/ecommerce_user?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=when-authorized
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=${SPRING_ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

