spring.application.name=order-service
server.port=8083
spring.datasource.url=jdbc:mysql://localhost:3307/ecommerce_order?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.template.default-topic=notificationTopic

# Eureka Client
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# gRPC Client Config
grpc.client.inventory-service.address=discovery:///inventory-service
grpc.client.inventory-service.enableKeepAlive=true
grpc.client.inventory-service.negotiationType=PLAINTEXT


# Circuit Breaker Configuration (Resilience4j)
resilience4j.circuitbreaker.instances.inventory.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.inventory.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.inventory.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.inventory.slidingWindowSize=5
resilience4j.circuitbreaker.instances.inventory.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventory.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.inventory.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.inventory.automaticTransitionFromOpenToHalfOpenEnabled=true

# Actuator & Prometheus
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
# Zipkin tracing
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=${SPRING_ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
