server.port=8085
spring.application.name=payment-service
spring.datasource.url=jdbc:mysql://localhost:3307/ecommerce_payment?createDatabaseIfNotExist=true
spring.rabbitmq.password=guest

# Stripe Configuration (Test Key)
stripe.keys.secret=${STRIPE_SECRET_KEY:sk_test_replace_this_with_your_key}

spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=when-authorized
# Zipkin tracing
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=${SPRING_ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
