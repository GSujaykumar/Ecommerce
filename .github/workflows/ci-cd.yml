name: Enterprise CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  # Replace with your actual github username if publishing
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            "api-gateway",
            "discovery-server",
            "user-service",
            "product-service",
            "order-service",
            "cart-service",
            "inventory-service",
            "payment-service",
            "notification-service",
          ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and Test ${{ matrix.service }}
        working-directory: ./backend
        run: mvn -pl ${{ matrix.service }} -am clean verify

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Formatted Code
        working-directory: ./frontend
        run: npm run build

  build-and-push-docker:
    needs: [build-and-test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Compose Stack
        working-directory: ./backend
        run: |
          docker compose -f docker-compose.prod.yml build
          # In a real environment, you would push these to AWS ECR or GHCR.
          # docker compose -f docker-compose.prod.yml push
